<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodingQuiz</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --accent:#3b82f6;
    --accent-hover:#2563eb;
    --text:#f8fafc;
    --muted:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:700px;
    background:var(--card);
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
    animation:fade .3s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    margin-bottom:10px;
}

.subtitle{
    color:var(--muted);
    margin-bottom:30px;
}

.language-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
}

.lang-btn,
.next-btn,
.secondary-btn{
    border:none;
    cursor:pointer;
    transition:.2s;
}

.lang-btn{
    background:#334155;
    color:white;
    padding:16px;
    border-radius:12px;
    font-size:1rem;
}

.lang-btn:hover{
    background:#475569;
}

.progress{
    width:100%;
    height:10px;
    background:#334155;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:25px;
}

.progress-fill{
    height:100%;
    width:0%;
    background:var(--accent);
    transition:.3s;
}

.meta{
    color:var(--muted);
    margin-bottom:20px;
}

.question{
    font-size:1.3rem;
    margin-bottom:20px;
}

.answers{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.answer{
    background:#334155;
    border:2px solid transparent;
    color:white;
    padding:14px;
    border-radius:12px;
    cursor:pointer;
    transition:.2s;
}

.answer:hover{
    border-color:var(--accent);
}

.answer.selected{
    border-color:var(--accent);
    background:#1d4ed8;
}

.controls{
    margin-top:25px;
}

.next-btn{
    background:var(--accent);
    color:white;
    padding:14px 24px;
    border-radius:12px;
    font-size:1rem;
}

.next-btn:hover{
    background:var(--accent-hover);
}

.secondary-btn{
    background:#334155;
    color:white;
    padding:14px 24px;
    border-radius:12px;
}

.button-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

.center{
    text-align:center;
}

.hidden{
    display:none;
}

.timer{
    font-size:4rem;
    margin:25px 0;
    font-weight:bold;
}

.breath-circle{
    width:120px;
    height:120px;
    background:var(--accent);
    border-radius:50%;
    margin:25px auto;
    animation:breathe 4s infinite ease-in-out;
}

@keyframes breathe{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.2);
    }
}
</style>
</head>
<body>

<div class="card">

    <!-- HOME -->
    <div id="home">
        <h1>Take a coding quiz.</h1>
        <p class="subtitle">See what you know!</p>

<div class="language-grid">
    <button class="lang-btn" onclick="startQuiz('Python')">🐍 Python</button>
    <button class="lang-btn" onclick="startQuiz('JavaScript')">⚡ JavaScript</button>
    <button class="lang-btn" onclick="startQuiz('HTML & CSS')">🎨 HTML & CSS</button>
    <button class="lang-btn" onclick="startQuiz('Lua')">🌙 Lua</button>
    <button class="lang-btn" onclick="startQuiz('C++')">⚙️ C++</button>
    <button class="lang-btn" onclick="startQuiz('Scratch')">🐱 Scratch</button>
<p class="subtitle">
    Any coding languages that aren't on here?
</p>

<button
    class="secondary-btn"
    onclick="window.location.href='mailto: ?subject=Quiz%20Suggestion&body=I%20would%20like%20to%20suggest:'"
>
    Suggest a Language
</button>
</div>
    </div>

    <!-- QUIZ -->
    <div id="quiz" class="hidden">

        <div class="progress">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="meta" id="meta"></div>

        <div class="question" id="question"></div>

        <div class="answers" id="answers"></div>

        <div class="controls">
            <button class="next-btn" onclick="nextQuestion()">
                Next
            </button>
        </div>

    </div>

    <!-- PART COMPLETE -->
    <div id="partScreen" class="hidden center">

        <h2 id="partTitle"></h2>

        <p style="margin-top:15px;" id="partScore"></p>

        <div class="button-row" style="justify-content:center;">
            <button class="next-btn" onclick="continueQuiz()">
                Continue
            </button>

            <button class="secondary-btn" onclick="startBreather()">
                Take a Breather
            </button>
        </div>

    </div>

    <!-- BREATHER -->
    <div id="breather" class="hidden center">

        <h2>Take a breather 🌿</h2>

        <p style="margin-top:10px;color:var(--muted);">
            Roll your shoulders.<br>
            Look away from your screen.<br>
            Close your eyes.
            Take a few slow breaths.
        </p>

        <div class="breath-circle"></div>

        <div class="timer" id="timer">30</div>

        <button class="next-btn" onclick="endBreather()">
            Continue Quiz
        </button>

    </div>

    <!-- RESULTS -->
    <div id="results" class="hidden center">

        <h1>🎉 Quiz Complete</h1>

        <p id="finalText" style="margin-top:15px;"></p>

        <div class="button-row" style="justify-content:center;">
            <button class="next-btn" onclick="location.reload()">
                Choose Another Language
            </button>
        </div>

    </div>

</div>

<script>

const quizzes = {

    {
        part:1,
        q:"Which symbol starts a single-line comment?",

    {
        part:2,
        q:"Which method adds an item to an array?",
        options:["append()","push()","add()","insert()"],
        answer:1
    },
    {
        part:2,
        q:"What does === compare?",
        options:["Value only","Type only","Value and type","Nothing"],

        part:2,

        options:[

        ],

        part:3,
        q:"Which event fires when a button is clicked?",
        options:["onhover","onclick","onpress","onfocus"],

],

"HTML & CSS": [

        part:1,

        answer:1
    },
    {
        part:1,
        q:"Which HTML tag creates a hyperlink?",
        options:["<link>","<a>","<url>","<href>"],
        answer:1
    },

        part:1,

    {

        q:"What does HTML stand for?",

    {
        part:3,
        q:"Which CSS property makes text bold?",
        options:["font-style","font-weight","text-bold","bold"],

],

Lua: [
    {
        part:1,
        q:"How do you create a local variable in Lua?",
        options:["var x = 5","local x = 5","let x = 5","x := 5"],

        part:1,

        answer:2
    },
    {
        part:1,

        options:["//","--","#","/*"],
        answer:1
    },

    {
        part:2,
        q:"What data structure is used for arrays and dictionaries in Lua?",
        options:["Table","List","Array","Collection"],
        answer:0
    },
    {
        part:2,

        options:["func","function","def","fn"],

        options:["&","+","..","concat"],

    {

],

        part:1,

        options:[":",".",";","!"],

    {

        q:"What is the purpose of variables in Scratch?",

            "Play sounds",
            "Change backdrops"
        ],
        answer:0

    {
        part:3,
        q:"Which loop repeats a set number of times?",
        options:[
            "forever",
            "repeat until",
            "repeat",
            "broadcast"
        ],
        answer:2
    }
],

};

let language = "";
let current = 0;
let score = 0;
let selected = null;
let waitingPart = false;

function startQuiz(lang){
    language = lang;

    document.getElementById("home").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    showQuestion();
}

function showQuestion(){

    selected = null;

    const q = quizzes[language][current];

    document.getElementById("meta").textContent =
        `${language} • Part ${q.part} of 3 • Question ${(current%3)+1} of 3`;

    document.getElementById("question").textContent = q.q;

    const answers = document.getElementById("answers");
    answers.innerHTML = "";

    q.options.forEach((option,index)=>{
        const btn = document.createElement("button");
        btn.className = "answer";
        btn.textContent = option;

        btn.onclick = ()=>{
            document
                .querySelectorAll(".answer")
                .forEach(a=>a.classList.remove("selected"));

            btn.classList.add("selected");
            selected = index;
        };

        answers.appendChild(btn);
    });

    const progress =
        (current / quizzes[language].length) * 100;

    document.getElementById("progressFill").style.width =
        progress + "%";
}

function nextQuestion(){

    if(selected === null){
        alert("Select an answer first.");
        return;
    }

    const q = quizzes[language][current];

    if(selected === q.answer){
        score++;
    }

    current++;

    if(current === quizzes[language].length){
        finishQuiz();
        return;
    }

    if(current === 3 || current === 6){
        waitingPart = true;
        showPartScreen();
        return;
    }

    showQuestion();
}

function showPartScreen(){

    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("partScreen").classList.remove("hidden");

    const part = current === 3 ? 1 : 2;

    document.getElementById("partTitle").textContent =
        `Great work! You completed Part ${part} of 3`;

    document.getElementById("partScore").textContent =
        `Current Score: ${score}/${current}`;
}

function continueQuiz(){

    document.getElementById("partScreen").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    showQuestion();
}

let timerInterval;
let breatherAudio;

function startBreather(){

    document.getElementById("partScreen").classList.add("hidden");
    document.getElementById("breather").classList.remove("hidden");

breatherAudio = new Audio("CalmMusic.mp3");

    breatherAudio.volume = 0.7;
    breatherAudio.loop = true;
    breatherAudio.play();

    let time = 30;

    document.getElementById("timer").textContent = time;

    timerInterval = setInterval(()=>{

        time--;

        document.getElementById("timer").textContent = time;

        if(time <= 0){
            clearInterval(timerInterval);
            endBreather();
        }

    },1000);
}

function endBreather(){

    clearInterval(timerInterval);

    if(breatherAudio){
        breatherAudio.pause();
        breatherAudio.currentTime = 0;
    }

    document.getElementById("breather").classList.add("hidden");

    continueQuiz();
}

function finishQuiz(){

    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("results").classList.remove("hidden");

    const percent =
        Math.round((score / quizzes[language].length) * 100);

    let rank = "";
    let message = "";

    if(percent >= 90){
        rank = "🏆 Expert";
        message = "Outstanding work! You really know your stuff.";
    }
    else if(percent >= 70){
        rank = "🥈 Intermediate";
        message = "Nice job! You have a solid understanding.";
    }
    else{
        rank = "🌱 Beginner";
        message = "Keep practicing and you'll improve quickly!";
    }

    document.getElementById("finalText").innerHTML = `
        <strong>${language} Quiz</strong><br><br>
        Score: ${score}/${quizzes[language].length}<br>
        Accuracy: ${percent}%<br>
        Rank: ${rank}<br><br>
        ${message}
    `;
}

</script>

</body>
</html>
